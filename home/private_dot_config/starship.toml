"$schema" = "https://starship.rs/config-schema.json"

add_newline = false

format = """\
$os\
$status\
$all\
$jobs\
$line_break\
$character"""

[aws]
disabled = true
[azure]
disabled = true
[gcloud]
disabled = true

[directory]
truncation_length = 4
truncate_to_repo = false
style = "yellow bold"
truncation_symbol = ".../"
fish_style_pwd_dir_length = 0

[character]
success_symbol = "[\\$]()"
error_symbol = "[\\$]()"

[status]
disabled = false
format = "[$symbol]($style) "
